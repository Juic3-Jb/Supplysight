<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Terminal dark background -->
  <rect width="180" height="180" rx="36" fill="#0D0A04"/>

  <!-- Globe: outer circle -->
  <circle cx="90" cy="90" r="58" stroke="#FFC107" stroke-width="8" fill="none"/>

  <!-- Globe: equator (horizontal rule across full diameter) -->
  <line x1="32" y1="90" x2="148" y2="90" stroke="#FFC107" stroke-width="6"/>

  <!-- Globe: central meridian ellipse -->
  <ellipse cx="90" cy="90" rx="28" ry="58" stroke="#FFC107" stroke-width="6" fill="none"/>

  <!-- Globe: upper latitude arc -->
  <path d="M 46 63 Q 68 52 90 63 Q 112 52 134 63" stroke="#FFC107" stroke-width="5" fill="none" opacity="0.65"/>

  <!-- Globe: lower latitude arc -->
  <path d="M 46 117 Q 68 128 90 117 Q 112 128 134 117" stroke="#FFC107" stroke-width="5" fill="none" opacity="0.65"/>

  <!-- Terminal cursor accent: orange dot at bottom-right (>_ nod) -->
  <circle cx="131" cy="131" r="14" fill="#FF3C00"/>
  <text x="131" y="137" text-anchor="middle" font-family="monospace" font-size="18" font-weight="bold" fill="#FFFFFF">›</text>
</svg>

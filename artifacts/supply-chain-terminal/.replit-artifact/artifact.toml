kind = "web"
previewPath = "/"
title = "Global Supply Chain Intelligence Terminal"
version = "1.0.0"
id = "artifacts/supply-chain-terminal"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25949

[services.development]
run = "pnpm --filter @workspace/supply-chain-terminal run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/supply-chain-terminal", "run", "build" ]
serve = "static"
publicDir = "artifacts/supply-chain-terminal/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25949"
BASE_PATH = "/"
